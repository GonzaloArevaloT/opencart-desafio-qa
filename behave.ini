[behave]
# Configuracion principal de behave para el proyecto opencart_desafioQA
# Define los formateadores de salida (consola legible + reporte HTML)
format = pretty
         behave_html_formatter:HTMLFormatter
outfiles = reports/report.html
show_skipped = false
show_timings = true
default_tags = ~@wip

[behave.formatters]
# Registra el formateador HTML para generar el reporte unico
behave_html_formatter = behave_html_formatter:HTMLFormatter
